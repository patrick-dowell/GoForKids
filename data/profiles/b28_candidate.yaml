# Seeded from b20.yaml as a starting point. Each (rank, board_size) profile
# is iterated against its b20 counterpart via data/calibrate_b28.py; values
# are committed back here as they pass the 45-55% target band. When every
# profile is locked in, the file is renamed b28.yaml and shipped.
#
# Same lookup semantics as b20.yaml (see profile_loader.py for details).

