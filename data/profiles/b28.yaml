      # v2 heavy-noise: visits 80->10, mistake 0.25->0.50, rand 0.02->0.12,
      # max_pl 10->8 (already low).
      max_point_loss: 8.0
      mistake_freq: 0.50
      policy_weight: 0.50
      randomness: 0.40
      random_move_chance: 0.12
      local_bias: 0.12
      first_line_chance: 0.0
      visits: 10
      min_candidates: 8
      opening_moves: 20
    "6k":
