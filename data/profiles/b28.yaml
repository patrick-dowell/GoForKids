# b28 — production calibration for the b28c512nbt KataGo network.
#
# Calibrated 2026-05-03/04 against the b20 baseline (g170e-b20c256x2) using
# data/calibrate_b28.py — head-to-head matches on each (rank, board_size)
# pair, knobs adjusted until b28-side win rate landed in the 45-55% target
# band (or as close as the profile permitted; per-profile iteration history
# in the inline comments below).
#
# Each profile's header comment lists the iterations tried and the final
# locked rate / margin. The dominant pattern: at moderate-to-high visit
# counts on bigger boards (9x9 6k, all 13x13 mid+high ranks, all 19x19),
# b28's stronger network dominates the symmetric profile and "heavy noise"
# (visits cut + mistake_freq bumped + random_move_chance bumped + max_pl
# capped) was needed to pull the rate back toward 50%. Some profiles —
# notably 13x13 15k — couldn't be brought into band with profile knobs at
# all and were locked at the b20-clone with documented over-strength.
#
# Same lookup semantics as b20.yaml (see profile_loader.py for details).

profiles:
  19x19:
    "30k":
      # b28 calibration:
      #   v1 visits=10 max_pl=30 mistake=0.55 rand=0.08: 90.0% n=30 margin +167.90
      #   v2 visits=10 max_pl=18 mistake=0.55 rand=0.08: 86.7% n=30 margin +137.43
      # max_pl reduction barely moved the needle (90% -> 87%). 19x19 30k is the
      # weakest-tier "Seedling" bot — kids' first 19x19 experience — and a 87%
      # rate with +137 margin means total domination. v3: aggressive multi-knob
      # noise injection to neutralize b28's MCTS quality.
      #   mistake_freq 0.55 -> 0.75 (more deliberate suboptimal moves)
      #   random_move_chance 0.08 -> 0.20 (more pure-random moves)
      #   visits 10 -> 6 (shallow search reduces b28's MCTS edge, though this
      #     theory failed on 13x13; trying anyway for the Seedling profile).
      max_point_loss: 18.0
      mistake_freq: 0.75
      policy_weight: 0.15
      randomness: 0.78
      random_move_chance: 0.20
      local_bias: 0.42
      first_line_chance: 0.0
      visits: 6
      min_candidates: 15
      opening_moves: 8
    "18k":
      # b28 calibration round 1: b20-clone landed at 80% n=30, margin +137.23.
      # Applying the 19x19 30k v3 heavy-noise template (proven to drop 30k from
      # 90% to 67%): cut visits 12->6, bump mistake_freq 0.55->0.72, bump
      # random_move_chance 0.12->0.22, cap max_point_loss 28->18.
      max_point_loss: 18.0
      mistake_freq: 0.72
      policy_weight: 0.18
      randomness: 0.76
      random_move_chance: 0.22
      local_bias: 0.38
      first_line_chance: 0.0
      visits: 6
      min_candidates: 15
      opening_moves: 12
    "15k":
      # b28 calibration round 1: b20-clone (visits=30, mistake=0.40) landed at
      # 83.3% n=30, margin +144. v2: heavy-noise template — visits 30->8,
      # mistake 0.40->0.65, rand 0.05->0.18, max_pl 20->14.
      max_point_loss: 14.0
      mistake_freq: 0.65
      policy_weight: 0.30
      randomness: 0.60
      random_move_chance: 0.18
      local_bias: 0.25
      first_line_chance: 0.0
      visits: 8
      min_candidates: 12
      opening_moves: 30
    "12k":
      # b28 calibration: v1 b20-clone visits=42 -> 90%/+165. v2 heavy-noise
      # template (worked at 19x19 30k/15k): visits 42->8, mistake 0.34->0.55,
      # rand 0.02->0.15, max_pl 17->13.
      max_point_loss: 13.0
      mistake_freq: 0.55
      policy_weight: 0.42
      randomness: 0.45
      random_move_chance: 0.15
      local_bias: 0.20
      first_line_chance: 0.0
      visits: 8
      min_candidates: 10
      opening_moves: 22
    "9k":
