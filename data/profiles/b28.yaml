      min_candidates: 10
      opening_moves: 22
    "9k":
      # 2026-05-05 RELABEL — interpolated midway between 12k Stream and the
      # old (over-strong) 9k profile. First-pass strength was too low: 8x10
      # bot-vs-bot trial showed 12k vs new-9k at only 60/40 even (target
      # ~85% for 3-rank gap on b28), 12k+H3 vs new-9k at 60/40 (target 50%).
      # Strength gap to 12k was ~1 rank, not 3.
      # Root cause: profile knobs aren't linear in strength. Visit-count →
      # strength curve is steep around visits 10-12 (where 6k vs 3k showed
      # 90% even), so the midway visits=9 sat much closer to 12k(visits=8)
      # than to 6k(visits=10) in skill-space.
      # Bump pass: shift the strength levers (visits, max_pl, rand) toward
      # the 6k slot's values; keep mistake_freq slightly above 6k's so the
      # 9k → 6k gap stays meaningful.
      # Validated 2026-05-05 in a 60-game v3 trial — both adjacent H3 matches
      # landed at 50% (12k+H3 vs 9k = 5/10, 9k+H3 vs 6k = 5/10), the textbook
      # 3-rank-gap target. Even-game numbers stay noisy (60% vs 12k, 90% vs
      # 6k) — H3 is the trustworthy signal at low visit counts on b28.
      # Trial logs: data/calibration_logs_b28/relabel_trial_2026-05-05/
      max_point_loss: 9.0
      mistake_freq: 0.51
      policy_weight: 0.47
      randomness: 0.41
      random_move_chance: 0.12
      local_bias: 0.15
      first_line_chance: 0.0
      visits: 10
      min_candidates: 9
      opening_moves: 21
    "6k":
      # 2026-05-05 RELABEL — was 19x19 9k. Original calibration:
      # v1 b20-clone (visits=80, mistake=0.25) -> 86.7%/+119.
      # v2 heavy-noise: visits 80->10, mistake 0.25->0.50, rand 0.02->0.12,
      # max_pl 10->8. Playtested as ~6k strength against humans, hence the
      # ladder shift.
      # v3 2026-06-11 soften (playtest: "a little too hard" at rungs 8k-6k):
      # mistake_freq 0.50->0.58, max_pl 8->6 — MORE mistakes but SMALLER, per
      # Patrick's direction. Two knobs on the SAME axis (mistake character),
      # quality knobs (visits/policy_weight) untouched. NOTE: lands alongside
      # the 2026-06-11 settle/komi fix, which STOPS the bot giving away 2-3
      # pts/game filling its own territory — net target is "slightly easier
      # than before", so the soften must outweigh that gain.
      # ⚠️ UNVALIDATED — verify via bot-vs-bot (6k should still beat 9k and
      # lose to 3k) or playtest; if overshot, revert max_pl 6->8 first.
      max_point_loss: 6.0
      mistake_freq: 0.58
      policy_weight: 0.50
      randomness: 0.40
      random_move_chance: 0.12
      local_bias: 0.12
      first_line_chance: 0.0
      visits: 10
      min_candidates: 8
      opening_moves: 20
    "3k":
      # 2026-05-05 RELABEL — was 19x19 6k. Original calibration:
      # v1 b20-clone (visits=120, mistake=0.22) -> 86.7%/+80.
      # v2 heavy-noise: visits 120->12, mistake 0.22->0.45, rand 0.02->0.10,
      # max_pl 9->7. Playtested as ~3k strength against humans, hence the
      # ladder shift. Replaces the old interpolated 3k placeholder.
      max_point_loss: 7.0
      mistake_freq: 0.45
      policy_weight: 0.50
      randomness: 0.38
      random_move_chance: 0.10
      local_bias: 0.08
      first_line_chance: 0.0
      visits: 12
