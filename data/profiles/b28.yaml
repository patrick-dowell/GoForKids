  9x9:
    # Feature 24 — final state 2026-05-19. Six profiles validated via
    # multiple bot-vs-bot iterations (DEVJOURNAL has the full history).
    # Five distinct effective strength tiers:
    #   30k anchor — KataGo lbio=true visits=4
    #   15k (new)  — KataGo lbio=false visits=6 (middle-tier, real rank
    #                ~15-22k pending playtest)
    #   9k  (new)  — KataGo lbio=false visits=9 (transition tier, real
    #                rank ~10-12k pending playtest)
    #   6k  anchor — KataGo lbio=false visits=12
    #   3k  (new)  — KataGo lbio=false visits=30 (validated this session)
    #   1d  anchor — KataGo lbio=false visits=50 (clean sigmoid komi
    #                response per Phase 1)
    # 18k and 12k slots are filled by stones/komi in the auto-play ladder
    # — no separate profiles. Heuristic-path attempts (save_atari_chance)
    # all landed at 30k tier; the lbio=true cliff and the heuristic floor
    # converge at the same ~30k effective strength. Detailed validation
    # margins are in data/calibration_logs_b28/9x9_final_validation_*.
    "30k":
      # Playtest-validated anchor (2026-05-18). Do not retune without
      # explicit playtest confirmation that 30k feels wrong.
      max_point_loss: 30.0
      mistake_freq: 0.70
      policy_weight: 0.08
      randomness: 0.88
      random_move_chance: 0.20
      local_bias: 0.85
      local_bias_in_opening: true
      first_line_chance: 0.0
      visits: 4
      min_candidates: 10
      opening_moves: 2
      pass_threshold: 0.10
      clarity_prior: 1.1
      clarity_score_gap: 999.0
    "15k":
      # FINAL 2026-05-19 (feature 24). Sourced from v2 18k profile (KataGo
      # path, visits=6, lbio=false). v2 test: beat 30k 97% with avg margin
      # -82 from 30k's perspective (a near-saturated stomp on 9x9 where
      # max margin is ~88). Loses ~97% to visits=10+ profiles (which all
      # cluster at 6k tier). Empirically a middle-tier bot — exact rank
      # uncertain (15-22k range) pending human playtest. Labeled 15k as a
      # reasonable provisional name.
      #
      # Earlier heuristic-path attempts (save_atari_chance 0.35-0.92) all
      # collapsed to 30k tier (see DEVJOURNAL feature 24 history). KataGo
      # lbio=false visits=6-8 is the only profile shape that lands in the
      # middle band.
      #
      # 2026-06-04 — weakened per playtest: 15k beat an adult tester twice
      # and felt too strong / the ladder reached it too fast. Goal: dull
      # move QUALITY without changing its mistake character (the serious
      # blunders read as fair for ~15k, so randomness / mistake_freq /
      # max_point_loss are deliberately UNCHANGED). Levers moved:
      #   visits 6 -> 5         (less reading)
      #   policy_weight 0.15 -> 0.12  (leans less on KataGo's strong policy)
      #   local_bias 0.30 -> 0.38     (more myopic, less whole-board play)
      # PENDING bot-vs-bot revalidation vs 30k (should still stomp) and 6k
      # (should still lose), plus a human playtest to confirm it eased.
      max_point_loss: 28.0
      mistake_freq: 0.72
      policy_weight: 0.12
      randomness: 0.78
      random_move_chance: 0.16
      local_bias: 0.38
      local_bias_in_opening: false
      first_line_chance: 0.0
      visits: 5
      min_candidates: 10
      opening_moves: 3
      pass_threshold: 0.10
