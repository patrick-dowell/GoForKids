      # v2 heavy-noise: visits 120->12, mistake 0.22->0.45, rand 0.02->0.10,
      # max_pl 9->7.
      max_point_loss: 7.0
      mistake_freq: 0.45
      policy_weight: 0.50
      randomness: 0.38
