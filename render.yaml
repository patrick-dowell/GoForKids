# Render blueprint for GoForKids beta hosting.
# Docs: https://render.com/docs/blueprint-spec
#
# This deploys two services:
#   1. goforkids-api    — FastAPI + KataGo (Eigen/CPU) via Dockerfile
#   2. goforkids-web    — Vite static site for the React frontend
#
# After connecting the repo, set these in the Render dashboard:
#   - goforkids-api → CORS_ALLOWED_ORIGINS (the deployed web URL)
#   - goforkids-web → VITE_API_BASE_URL    (the deployed API URL)
#
# Resource size (CPU/RAM) is managed via the dashboard slider, not here —
# resize anytime without redeploying. Current floor for b20 is 2 GB RAM.
#
# ANTHROPIC_API_KEY is optional — only the (not-yet-wired) study-mode
# narrator reads it. Skip it for now; add later when AI teacher ships.

services:
  - type: web
    name: goforkids-api
    runtime: docker
    region: oregon
    # Build context is the repo root (no rootDir) so the image can carry
    # both backend/ and data/profiles/. Mirrors docker-compose.yml.
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: GOFORKIDS_DB
        value: /data/goforkids.db
      - key: CORS_ALLOWED_ORIGINS
        sync: false      # e.g. https://goforkids-web.onrender.com,https://goforkids.example.com
      # KATAGO_PATH / KATAGO_MODEL / KATAGO_CONFIG / KATAGO_THREADS are baked
      # into the Dockerfile ENV — no need to repeat here. Override via dashboard
      # if you want to retune visits or threads without rebuilding.
    disk:
      name: goforkids-data
      mountPath: /data
      sizeGB: 1

  - type: web
    name: goforkids-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        sync: false      # Set to the goforkids-api URL after first deploy.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
